<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff9f1c"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#79c0ff"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ea043"/>
      <stop offset="100%" style="stop-color:#56d364"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#484f58"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b35"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f0f6fc" font-size="18" font-weight="700">🚀 AutoPilot</text>
  <text x="450" y="62" text-anchor="middle" fill="#8b949e" font-size="11">spec in → built project + github repo + tweets out</text>

  <!-- YOU node (left) -->
  <rect x="30" y="200" width="120" height="56" rx="28" fill="none" stroke="url(#accent)" stroke-width="2" filter="shadow"/>
  <text x="90" y="224" text-anchor="middle" fill="#ff9f1c" font-size="11" font-weight="600">YOU</text>
  <text x="90" y="240" text-anchor="middle" fill="#8b949e" font-size="9">write spec.md</text>

  <!-- Arrow: YOU → Plan -->
  <line x1="150" y1="228" x2="195" y2="228" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 1: Plan Features -->
  <rect x="200" y="96" width="140" height="56" rx="10" fill="#1c2333" stroke="#58a6ff" stroke-width="1.5" filter="shadow"/>
  <text x="270" y="118" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="700">📋 PLAN</text>
  <text x="270" y="134" text-anchor="middle" fill="#8b949e" font-size="9">pick 2-4 features</text>

  <!-- STEP 2: Build Code -->
  <rect x="200" y="200" width="140" height="56" rx="10" fill="#1c2333" stroke="url(#blue)" stroke-width="1.5" filter="shadow"/>
  <text x="270" y="222" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="700">🔨 BUILD</text>
  <text x="270" y="238" text-anchor="middle" fill="#8b949e" font-size="9">codex / claude</text>

  <!-- STEP 3: Test -->
  <rect x="200" y="304" width="140" height="56" rx="10" fill="#1c2333" stroke="url(#green)" stroke-width="1.5" filter="shadow"/>
  <text x="270" y="326" text-anchor="middle" fill="#56d364" font-size="10" font-weight="700">✅ TEST</text>
  <text x="270" y="342" text-anchor="middle" fill="#8b949e" font-size="9">every 2 iterations</text>

  <!-- Arrows: Plan → Build → Test -->
  <line x1="270" y1="152" x2="270" y2="196" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="256" x2="270" y2="300" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Test → Commit -->
  <line x1="340" y1="332" x2="420" y2="332" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 4: Commit + Push -->
  <rect x="425" y="304" width="140" height="56" rx="10" fill="#1c2333" stroke="url(#green)" stroke-width="1.5" filter="shadow"/>
  <text x="495" y="326" text-anchor="middle" fill="#56d364" font-size="10" font-weight="700">📦 COMMIT</text>
  <text x="495" y="342" text-anchor="middle" fill="#8b949e" font-size="9">git push → github</text>

  <!-- Arrow: Commit → Tweet -->
  <line x1="495" y1="304" x2="495" y2="260" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 5: Tweet -->
  <rect x="425" y="200" width="140" height="56" rx="10" fill="#1c2333" stroke="url(#accent)" stroke-width="1.5" filter="shadow"/>
  <text x="495" y="222" text-anchor="middle" fill="#ff9f1c" font-size="10" font-weight="700">🐦 TWEET</text>
  <text x="495" y="238" text-anchor="middle" fill="#8b949e" font-size="9">share progress</text>

  <!-- Arrow: Tweet → Cooldown -->
  <line x1="495" y1="200" x2="495" y2="156" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 6: Cooldown -->
  <rect x="425" y="96" width="140" height="56" rx="10" fill="#1c2333" stroke="#484f58" stroke-width="1.5" filter="shadow"/>
  <text x="495" y="118" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="700">⏳ COOLDOWN</text>
  <text x="495" y="134" text-anchor="middle" fill="#6e7681" font-size="9">120s then repeat</text>

  <!-- Loop arrow: Cooldown → Plan (curved) -->
  <path d="M 425 124 C 370 90 340 90 300 96" fill="none" stroke="#ff6b35" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <text x="360" y="82" text-anchor="middle" fill="#ff6b35" font-size="9" font-weight="600">LOOP</text>

  <!-- Divider -->
  <line x1="620" y1="80" x2="620" y2="440" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right side: Growth Mode -->
  <text x="760" y="100" text-anchor="middle" fill="#f0f6fc" font-size="13" font-weight="700">📣 Growth Mode</text>

  <!-- Discover -->
  <rect x="690" y="120" width="140" height="44" rx="8" fill="#1c2333" stroke="url(#purple)" stroke-width="1.5" filter="shadow"/>
  <text x="760" y="146" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">🔍 Discover</text>

  <!-- Post -->
  <rect x="690" y="180" width="140" height="44" rx="8" fill="#1c2333" stroke="url(#purple)" stroke-width="1.5" filter="shadow"/>
  <text x="760" y="206" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">📝 Post</text>

  <!-- Engage -->
  <rect x="690" y="240" width="140" height="44" rx="8" fill="#1c2333" stroke="url(#purple)" stroke-width="1.5" filter="shadow"/>
  <text x="760" y="266" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">💬 Engage</text>

  <!-- Learn -->
  <rect x="690" y="300" width="140" height="44" rx="8" fill="#1c2333" stroke="url(#purple)" stroke-width="1.5" filter="shadow"/>
  <text x="760" y="326" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">🧠 Learn</text>

  <!-- Growth arrows -->
  <line x1="760" y1="164" x2="760" y2="176" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="760" y1="224" x2="760" y2="236" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="760" y1="284" x2="760" y2="296" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Platform icons -->
  <rect x="670" y="370" width="180" height="60" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="760" y="391" text-anchor="middle" fill="#6e7681" font-size="9">PLATFORMS</text>
  <text x="760" y="416" text-anchor="middle" fill="#8b949e" font-size="11">Twitter · Reddit · HN</text>
  <text x="760" y="432" text-anchor="middle" fill="#8b949e" font-size="11">Dev.to · LinkedIn</text>

  <!-- Arrow: Learn → Platforms -->
  <line x1="760" y1="344" x2="760" y2="366" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Config files badge -->
  <rect x="50" y="410" width="510" height="80" rx="10" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="70" y="435" fill="#6e7681" font-size="9" font-weight="600">CONFIGURABLE</text>
  <text x="70" y="458" fill="#58a6ff" font-size="10">program.md</text>
  <text x="180" y="458" fill="#8b949e" font-size="9">growth strategy</text>
  <text x="70" y="476" fill="#56d364" font-size="10">build_program.md</text>
  <text x="210" y="476" fill="#8b949e" font-size="9">build rules</text>
  <text x="340" y="458" fill="#ff9f1c" font-size="10">personality.md</text>
  <text x="470" y="458" fill="#8b949e" font-size="9">voice & tone</text>
  <text x="340" y="476" fill="#8b949e" font-size="9">edit these to customize behavior — no code changes needed</text>
</svg>
